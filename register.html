<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>申请评估师账号 - LINN 面部歪斜评估系统</title>
  <style>
    :root {
      --green-primary: #2E7D32; --green-light: #4CAF50; --green-bg: #E8F5E9;
      --purple-primary: #7B1FA2; --purple-light: #9C27B0; --purple-bg: #F3E5F5;
      --bg: #F5F5F5; --card: #FFFFFF; --text: #212121; --text-secondary: #757575;
      --danger: #D32F2F; --info: #1976D2; --border: #E0E0E0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, var(--green-primary), var(--purple-primary));
      color: white; padding: 28px 20px; text-align: center;
    }
    .header .logo { font-size: 40px; margin-bottom: 10px; }
    .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 2px; }
    .header p { font-size: 13px; opacity: 0.85; margin-top: 6px; }
    .container { max-width: 440px; margin: 0 auto; padding: 24px 16px; }
    .card {
      background: var(--card); border-radius: 16px; padding: 28px 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .card h2 { font-size: 18px; text-align: center; color: var(--green-primary); margin-bottom: 6px; }
    .card .sub { font-size: 13px; color: var(--text-secondary); text-align: center; margin-bottom: 20px; line-height: 1.6; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 7px; }
    .form-group input {
      width: 100%; padding: 12px 14px; border: 2px solid var(--border);
      border-radius: 10px; font-size: 15px; outline: none; background: #FAFAFA;
      font-family: inherit; transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--green-primary); background: white; }
    .form-group input.error { border-color: var(--danger); }
    .form-group .hint { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
    .error-msg {
      background: #FFEBEE; color: var(--danger); padding: 10px 14px;
      border-radius: 8px; font-size: 13px; margin-bottom: 14px;
      border-left: 4px solid var(--danger); display: none;
    }
    .success-card {
      background: var(--green-bg); border-radius: 16px; padding: 40px 24px;
      text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      display: none;
    }
    .success-card .icon { font-size: 56px; margin-bottom: 16px; }
    .success-card h2 { font-size: 18px; color: var(--green-primary); margin-bottom: 10px; }
    .success-card p { font-size: 14px; color: var(--text-secondary); line-height: 1.7; }
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--green-primary), var(--green-light));
      color: white; margin-top: 8px;
    }
    .btn-primary:hover { box-shadow: 0 4px 16px rgba(46,125,50,0.3); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: transparent; color: var(--green-primary);
      border: 2px solid var(--green-primary);
    }
    .btn-ghost:hover { background: var(--green-bg); }
    .btn-ghost {
      background: transparent; color: var(--green-primary);
      border: 2px solid var(--green-primary); margin-top: 10px;
    }
    .note {
      background: #FFF8E1; border-left: 4px solid var(--warning);
      border-radius: 0 8px 8px 0; padding: 12px 14px;
      font-size: 13px; color: var(--text); line-height: 1.7; margin-top: 16px;
    }
    .contact-note {
      text-align: center; margin-top: 24px; font-size: 12px; color: var(--text-secondary); line-height: 1.8;
    }
    .contact-note a { color: var(--purple-primary); text-decoration: none; }
    .divider { height: 1px; background: var(--border); margin: 20px 0; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">🌿</div>
  <h1>LINN 面部歪斜评估系统</h1>
  <p>专业版 · 评估师账号申请</p>
</div>

<div class="container">

  <!-- Register Form -->
  <div class="card" id="registerCard">
    <h2>申请账号</h2>
    <div class="sub">填写以下信息，提交后联系管理员开通账号</div>
    <div class="error-msg" id="errorMsg"></div>
    <form id="registerForm" onsubmit="return false;">
      <div class="form-group">
        <label>姓名 *</label>
        <input type="text" id="nameInput" placeholder="请输入真实姓名" required>
      </div>
      <div class="form-group">
        <label>邮箱地址 *</label>
        <input type="email" id="emailInput" placeholder="用于登录系统" required>
        <div class="hint">账号开通后会收到通知（请确保邮箱正确）</div>
      </div>
      <div class="form-group">
        <label>设置密码 *</label>
        <input type="password" id="passwordInput" placeholder="至少6位密码" minlength="6" required>
      </div>
      <div class="form-group">
        <label>手机/微信（选填）</label>
        <input type="text" id="phoneInput" placeholder="方便管理员联系你">
        <div class="hint">可不填</div>
      </div>
      <button class="btn btn-primary" id="submitBtn" onclick="doSubmit()">提交申请</button>
      <button class="btn btn-ghost" onclick="window.location.href='index.html'">已有账号？登录</button>
    </form>
    <div class="divider"></div>
    <div class="note">
      📋 <strong>开通流程：</strong><br>
      1. 填写信息并提交<br>
      2. 联系管理员 WeChat: <strong>LinnChang2017</strong><br>
      3. 管理员开通后你可登录系统
    </div>
  </div>

  <!-- Success State -->
  <div class="success-card" id="successCard">
    <div class="icon">✅</div>
    <h2>申请已提交！</h2>
    <p>请复制下方信息，发给管理员开通账号：</p>
    <div id="shareText" style="background:#FFF;border:2px dashed #CCC;border-radius:8px;padding:12px;font-size:13px;margin:14px 0;white-space:pre-wrap;line-height:1.7;user-select:all;"></div>
    <button class="btn btn-primary" id="copyBtn" onclick="copyAndShare()">📋 复制注册信息</button>
    <p style="font-size:12px;color:#757575;margin-top:8px;">复制后打开微信，粘贴发送给 <strong>LinnChang2017</strong></p>
    <button class="btn btn-ghost" onclick="window.location.href='index.html'" style="margin-top:10px;">返回登录页</button>
  </div>

  <div class="contact-note">
    学习&合作联系<br>
    WeChat: <strong>LinnChang2017</strong><br>
    Instagram: <a href="#">Linn_Aesthetic</a>
  </div>
</div>

<script>
const AIRTABLE_API_KEY = localStorage.getItem('linn_airtable_key') || '';
const AIRTABLE_BASE_ID = localStorage.getItem('linn_airtable_base') || '';
const SUPABASE_URL = 'https://uyktwvnllouhvovqpnrd.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5a3R3dm5sbG91aHZvdnFwbnJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDAwNzgsImV4cCI6MjA5MDg3NjA3OH0.V6M9zBZekUHvJ7Xz9kge0_cqBbMbX-2MxUl1rWhxt-0';

async function supabaseFetch(table, options = {}) {
  const { method = 'GET', body, filters, select = '*' } = options;
  let url = `${SUPABASE_URL}/rest/v1/${table}?select=${select}`;
  if (filters) {
    Object.entries(filters).forEach(([k, v]) => { url += `&${k}=eq.${encodeURIComponent(v)}`; });
  }
  const res = await fetch(url, {
    method,
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`
    },
    ...(body ? { body: JSON.stringify(body) } : {})
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password + 'linn_salt_2026');
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function copyAndShare() {
  const text = document.getElementById('shareText').textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✅ 已复制到剪贴板！';
      btn.style.background = 'var(--green-primary)';
      setTimeout(() => {
        btn.textContent = '📋 复制注册信息';
        btn.style.background = '';
      }, 2500);
    });
  } else {
    // Fallback: select text
    const el = document.getElementById('shareText');
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }
}

async function doSubmit() {
  const name = document.getElementById('nameInput').value.trim();
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const phone = document.getElementById('phoneInput').value.trim();

  if (!name) { showError('请输入姓名'); return; }
  if (!email) { showError('请输入邮箱'); return; }
  if (!password || password.length < 6) { showError('密码至少6位'); return; }

  // Check if API is configured
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '提交中...';

  try {
    // Check if email already registered in Supabase
    const existing = await supabaseFetch('assessors', { filters: { email } });
    if (existing && existing.length > 0) {
      showError('该邮箱已被注册，请联系管理员或使用其他邮箱');
      btn.disabled = false;
      btn.textContent = '提交申请';
      return;
    }

    // Submit registration to Supabase
    const hash = await hashPassword(password);
    await supabaseFetch('assessors', {
      method: 'POST',
      body: {
        name,
        email,
        password: hash,
        status: '待激活',
        phone,
        created_at: new Date().toISOString()
      }
    });

    const msg = `【新评估师注册申请】

姓名：${name}
邮箱：${email}
手机/微信：${phone || '未填写'}
申请时间：${new Date().toLocaleString('zh-CN')}

请登录后台开通账号。`;
      document.getElementById('shareText').textContent = msg;
      document.getElementById('registerCard').style.display = 'none';
      document.getElementById('successCard').style.display = 'block';
  } catch (e) {
    showError('提交失败：' + e.message);
    btn.disabled = false;
    btn.textContent = '提交申请';
  }
}
</script>
</body>
</html>
