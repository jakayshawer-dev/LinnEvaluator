<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统配置 - LINN 面部歪斜评估系统</title>
  <style>
    :root {
      --green-primary: #2E7D32;
      --green-light: #4CAF50;
      --purple-primary: #7B1FA2;
      --bg: #F5F5F5;
      --card: #FFFFFF;
      --text: #212121;
      --text-secondary: #757575;
      --border: #E0E0E0;
      --info: #1976D2;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, var(--green-primary), var(--purple-primary));
      color: white; padding: 20px; text-align: center;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .container { max-width: 600px; margin: 0 auto; padding: 24px 16px; }
    .card {
      background: var(--card); border-radius: 14px; padding: 24px 20px; margin-bottom: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    .card h2 { font-size: 16px; margin-bottom: 14px; color: var(--green-primary); }
    .info-box {
      background: #E8F5E9; border-left: 4px solid var(--green-primary);
      padding: 12px 14px; border-radius: 0 8px 8px 0; font-size: 13px; line-height: 1.7; margin-bottom: 12px;
    }
    .info-box a { color: var(--purple-primary); text-decoration: none; }
    .supabase-note {
      background: #FFF3E0; border-left: 4px solid #F57C00;
      padding: 14px; border-radius: 0 8px 8px 0; font-size: 13px; line-height: 1.7; margin-bottom: 16px;
    }
    .supabase-note strong { color: #E65100; }
    .field-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
    .field-table th, .field-table td { border: 1px solid var(--border); padding: 6px 8px; text-align: left; }
    .field-table th { background: #F5F5F5; font-weight: 600; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 10px 14px; border: 2px solid var(--border); border-radius: 8px;
      font-size: 14px; outline: none; background: #FAFAFA;
    }
    .form-group input:focus { border-color: var(--green-primary); background: white; }
    .form-group .hint { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
    .btn { width: 100%; padding: 13px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .btn-primary { background: linear-gradient(135deg, var(--green-primary), var(--green-light)); color: white; margin-top: 10px; }
    .btn-primary:hover { box-shadow: 0 4px 16px rgba(46,125,50,0.3); }
    .btn-secondary { background: white; color: var(--green-primary); border: 2px solid var(--green-primary); margin-top: 8px; }
    .success-msg {
      background: #E8F5E9; color: var(--green-primary); padding: 12px 14px; border-radius: 8px;
      font-size: 14px; margin-bottom: 16px; display: none; border-left: 4px solid var(--green-primary);
    }
  </style>
</head>
<body>

<div class="header">
  <h1>⚙️ 系统配置</h1>
</div>

<div class="container">

  <div class="card">
    <h2>📊 数据库状态</h2>
    <div class="supabase-note">
      ✅ <strong>已配置 Supabase</strong><br>
      项目：林琳美学评估系统<br>
      地址：supabase.com/project/uyktwvnllouhvovqpnrd<br>
      <br>
      数据库已创建完成，所有表已就绪。<br>
      演示模式无需任何配置，可直接使用。
    </div>
    <div class="info-box">
      💡 <strong>提示：</strong>系统已连接 Supabase 免费数据库。<br>
      演示模式使用本地存储，无需配置即可体验完整流程。<br>
      正式使用时请确保 Supabase 连接正常。
    </div>
    <button class="btn btn-primary" onclick="window.location.href='index.html'">返回登录页 →</button>
  </div>

</div>

</body>
</html>
