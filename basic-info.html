<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>基础信息 - LINN 面部歪斜评估系统</title>
  <style>
    :root {
      --green-primary: #2E7D32; --green-light: #4CAF50; --green-bg: #E8F5E9;
      --purple-primary: #7B1FA2; --purple-light: #9C27B0;
      --bg: #F5F5F5; --card: #FFFFFF; --text: #212121; --text-secondary: #757575;
      --danger: #D32F2F; --info: #1976D2; --border: #E0E0E0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }
    .progress-bar {
      background: linear-gradient(135deg, var(--green-primary), var(--purple-primary));
      color: white; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
    }
    .progress-bar .step { font-size: 13px; opacity: 0.8; }
    .progress-bar .title { font-size: 15px; font-weight: 700; letter-spacing: 1px; }
    .progress-dots { display: flex; gap: 6px; align-items: center; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.4);
    }
    .dot.active { background: white; width: 20px; border-radius: 4px; }
    .container { max-width: 600px; margin: 0 auto; padding: 16px; padding-bottom: 100px; }
    .section-title {
      font-size: 15px; font-weight: 700; color: var(--green-primary);
      margin: 20px 0 12px; padding-bottom: 6px; border-bottom: 2px solid var(--green-bg);
      display: flex; align-items: center; gap: 6px;
    }
    .info-card {
      background: var(--card); border-radius: 12px; padding: 16px;
      margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .client-name-display {
      font-size: 20px; font-weight: 700; color: var(--green-primary); margin-bottom: 4px;
    }
    .client-meta-display { font-size: 12px; color: var(--text-secondary); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { margin-bottom: 12px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px 12px; border: 2px solid var(--border); border-radius: 8px;
      font-size: 14px; outline: none; background: #FAFAFA; font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--green-primary); background: white;
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .radio-option {
      flex: 1; min-width: 70px; padding: 8px 12px; border: 2px solid var(--border); border-radius: 8px;
      text-align: center; font-size: 13px; cursor: pointer; transition: all 0.2s;
    }
    .radio-option.selected { border-color: var(--green-primary); background: var(--green-bg); color: var(--green-primary); font-weight: 700; }
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; background: white;
      padding: 12px 16px; display: flex; gap: 10px; box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
      max-width: 600px; margin: 0 auto; z-index: 100;
    }
    .btn { flex: 1; padding: 13px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-prev { background: #EEE; color: var(--text-secondary); }
    .btn-next { background: linear-gradient(135deg, var(--green-primary), var(--green-light)); color: white; }
    .btn-save { background: var(--purple-primary); color: white; }
    .auto-save-badge {
      position: fixed; top: 70px; right: 16px; background: var(--green-bg); color: var(--green-primary);
      padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
      opacity: 0; transition: opacity 0.3s; z-index: 99;
    }
    .auto-save-badge.show { opacity: 1; }
  </style>
</head>
<body>

<div class="progress-bar">
  <div class="step">步骤 1/5</div>
  <div class="progress-dots">
    <div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <div class="title">基础信息</div>
</div>

<div class="auto-save-badge" id="saveBadge">✓ 已自动保存</div>

<div class="container">
  <div class="info-card" style="border-left: 4px solid var(--green-primary);">
    <div class="client-name-display" id="clientName">加载中...</div>
    <div class="client-meta-display" id="clientMeta"></div>
  </div>

  <div class="section-title">📋 评估信息</div>
  <div class="info-card">
    <div class="form-grid">
      <div class="form-group">
        <label>评估师</label>
        <input type="text" id="assessorName" readonly style="background:#EEE;">
      </div>
      <div class="form-group">
        <label>评估日期</label>
        <input type="date" id="assessmentDate">
      </div>
    </div>
  </div>

  <div class="section-title">👤 客户基础信息</div>
  <div class="info-card">
    <div class="form-grid">
      <div class="form-group">
        <label>姓名</label>
        <input type="text" id="clientNameInput" placeholder="客户姓名">
      </div>
      <div class="form-group">
        <label>性别</label>
        <select id="clientGender">
          <option value="">请选择</option>
          <option value="男">男</option>
          <option value="女">女</option>
        </select>
      </div>
      <div class="form-group">
        <label>年龄</label>
        <input type="number" id="clientAge" placeholder="年龄" min="1" max="120">
      </div>
      <div class="form-group">
        <label>职业（选填）</label>
        <input type="text" id="clientJob" placeholder="职业">
      </div>
      <div class="form-group full">
        <label>主诉 / 来访目的</label>
        <textarea id="clientComplaint" placeholder="请描述客户的主要诉求或困扰..."></textarea>
      </div>
    </div>
  </div>

  <div class="section-title">📝 备注</div>
  <div class="info-card">
    <div class="form-group full">
      <textarea id="remark" placeholder="其他备注信息（选填）..." style="min-height:100px;"></textarea>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <button class="btn btn-prev" onclick="window.location.href='clients.html'">← 返回客户</button>
  <button class="btn btn-save" onclick="saveAndExport()">💾 保存</button>
  <button class="btn btn-next" onclick="goNext()">下一步 →</button>
</div>

<script>
const ASSESSOR_NAME = localStorage.getItem('linn_assessor_name') || '演示评估师';
const SUPABASE_URL = 'https://uyktwvnllouhvovqpnrd.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5a3R3dm5sbG91aHZvdnFwbnJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDAwNzgsImV4cCI6MjA5MDg3NjA3OH0.V6M9zBZekUHvJ7Xz9kge0_cqBbMbX-2MxUl1rWhxt-0';

async function supabaseFetch(table, options = {}) {
  const { method = 'GET', body, filters, select = '*' } = options;
  let url = `${SUPABASE_URL}/rest/v1/${table}?select=${select}`;
  if (filters) {
    Object.entries(filters).forEach(([k, v]) => {
      url += `&${k}=eq.${encodeURIComponent(v)}`;
    });
  }
  const res = await fetch(url, {
    method,
    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` },
    ...(body ? { body: JSON.stringify(body) } : {})
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

const urlParams = new URLSearchParams(window.location.search);
const clientId = urlParams.get('client') || '';

// Auto-save
let saveTimeout;
function triggerAutoSave() {
  clearTimeout(saveTimeout);
  document.getElementById('saveBadge').classList.remove('show');
  saveTimeout = setTimeout(() => {
    saveData(true);
    document.getElementById('saveBadge').classList.add('show');
    setTimeout(() => document.getElementById('saveBadge').classList.remove('show'), 2000);
  }, 1500);
}

const inputs = document.querySelectorAll('input, select, textarea');
inputs.forEach(el => el.addEventListener('input', triggerAutoSave));

// Init
document.getElementById('assessorName').value = ASSESSOR_NAME;
document.getElementById('assessmentDate').value = new Date().toISOString().split('T')[0];

// Load existing assessment data first (from localStorage), then overlay with fresh client data
function loadAssessmentData() {
  const saved = localStorage.getItem('linn_current_assessment');
  if (saved) {
    const data = JSON.parse(saved);
    if (data.basicInfo) {
      Object.entries(data.basicInfo).forEach(([k, v]) => {
        const el = document.getElementById(k);
        if (el) el.value = v || '';
      });
    }
  }
}

// Load client data from Supabase
async function loadClient() {
  if (!clientId || clientId.startsWith('demo') || clientId === 'new') {
    document.getElementById('clientName').textContent = '新客户';
    document.getElementById('clientMeta').textContent = '新建档案';
    document.getElementById('clientNameInput').value = '';
    return;
  }
  try {
    const clients = await supabaseFetch('clients', { filters: { id: clientId } });
    if (clients && clients.length > 0) {
      const c = clients[0];
      document.getElementById('clientName').textContent = c.name;
      document.getElementById('clientMeta').textContent = `${c.gender || ''} ${c.age ? c.age + '岁' : ''} · ${c.assessor || ''}`;
      document.getElementById('clientNameInput').value = c.name || '';
      document.getElementById('clientGender').value = c.gender || '';
      document.getElementById('clientAge').value = c.age || '';
    }
  } catch (e) {
    console.error(e);
  }
}

// Init: run both, with client data taking priority
loadAssessmentData();
loadClient();

async function saveData(silent = false) {
  const basicInfo = {
    assessorName: document.getElementById('assessorName').value,
    assessmentDate: document.getElementById('assessmentDate').value,
    clientName: document.getElementById('clientNameInput').value,
    clientGender: document.getElementById('clientGender').value,
    clientAge: document.getElementById('clientAge').value,
    clientJob: document.getElementById('clientJob').value,
    clientComplaint: document.getElementById('clientComplaint').value,
    remark: document.getElementById('remark').value
  };

  let assessment = JSON.parse(localStorage.getItem('linn_current_assessment') || '{}');
  assessment.clientId = clientId;
  assessment.basicInfo = basicInfo;
  assessment.updatedAt = new Date().toISOString();

  if (!assessment.id) {
    assessment.id = 'assess_' + Date.now();
    assessment.createdAt = new Date().toISOString();
    assessment.status = '进行中';
  }

  localStorage.setItem('linn_current_assessment', JSON.stringify(assessment));

  if (!silent) {
    alert('✅ 基础信息已保存');
  }
}

function saveAndExport() {
  saveData(true);
  const assessment = JSON.parse(localStorage.getItem('linn_current_assessment') || '{}');
  const name = assessment.basicInfo?.clientName || '未命名';
  const date = new Date().toISOString().split('T')[0];
  const blob = new Blob([JSON.stringify(assessment, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `LinnEvaluator_${name}_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

async function goNext() {
  const isNew = !clientId || clientId === 'new' || clientId.startsWith('demo') || clientId.startsWith('assess_');

  // 新建客户：清空旧的评估数据
  if (isNew) {
    localStorage.removeItem('linn_current_assessment');
  }

  saveData(true);
  let finalClientId = clientId;

  // 如果已有真实 clientId（非 new/demo/assess_ 前缀），直接跳转
  if (isNew) {
    const name = document.getElementById('clientNameInput').value.trim() || '未命名客户';
    const gender = document.getElementById('clientGender').value;
    const age = parseInt(document.getElementById('clientAge').value) || 0;
    try {
      const newClient = await supabaseFetch('clients', {
        method: 'POST',
        body: {
          name,
          gender,
          age,
          phone: '',
          assessor: localStorage.getItem('linn_assessor_name')
        }
      });
      if (!newClient || !newClient.id) {
        alert('❌ 客户保存失败，请重试');
        return;
      }
      finalClientId = newClient.id;
      let assessment = JSON.parse(localStorage.getItem('linn_current_assessment') || '{}');
      assessment.clientId = finalClientId;
      localStorage.setItem('linn_current_assessment', JSON.stringify(assessment));
    } catch (e) {
      alert('❌ 客户保存失败：' + e.message);
      return;
    }
  }

  window.location.href = 'overview.html' + (finalClientId ? '?client=' + finalClientId : '');
}
</script>
</body>
</html>
